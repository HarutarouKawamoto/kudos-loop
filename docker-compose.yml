services:
  backend:
    build: ./backend
    ports:
      - '3001:3000'  # Next.js用
      - "5555:5555"  # Prisma Studio用
    command: npm run start:dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
     - DATABASE_URL=${DATABASE_URL}
     - PRISMA_STUDIO_HOST=0.0.0.0
    depends_on:
      - db
    env_file:
     - ./backend/.env
  
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kudos_db
    ports:
      - '5433:5432'
    volumes:
     - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: