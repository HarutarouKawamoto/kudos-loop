services:
  backend:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://user:password@db:5432/kudos_db
    depends_on:
      - db
  
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kudos_db
    ports:
      - '5432:5432'
    volumes:
     - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: